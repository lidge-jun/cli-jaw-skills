<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            width: 960px;
            height: 540px;
            background-color: #0F172A;
            font-family: Arial, sans-serif;
        }

        .card {
            position: absolute;
            left: 48px;
            top: 96px;
            width: 400px;
            height: 300px;
            background-color: #1E293B;
            border-radius: 8px;
        }

        h1 {
            position: absolute;
            left: 48px;
            top: 30px;
            color: white;
            font-size: 28px;
        }

        p {
            position: absolute;
            left: 72px;
            top: 130px;
            width: 350px;
            color: #CBD5E1;
            font-size: 14px;
        }

        .placeholder {
            position: absolute;
            left: 500px;
            top: 96px;
            width: 420px;
            height: 360px;
        }
    </style>
</head>

<body>
    <div class="card"></div>
    <h1>Sample Slide</h1>
    <p>This text will become a <b>native</b> PowerPoint text box with <em>inline formatting</em>.</p>
    <div class="placeholder" id="chart-area"></div>
</body>

</html>
