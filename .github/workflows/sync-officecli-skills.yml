# Sync OfficeCLI skills into cli-jaw-skills
#
# Trigger: repository_dispatch from OfficeCLI repo, or manual
# What it does:
#   1. Clones OfficeCLI repo (skills/ directory only via sparse-checkout)
#   2. For MAIN skills (docx/pptx/xlsx): copies creating.md + editing.md to PARENT level
#      (SKILL.md is NOT copied — it's merged into the parent SKILL.md)
#   3. For BONUS skills (academic-paper, pitch-deck, morph-ppt, etc.): copies EVERYTHING
#   4. HWP: no sync needed (no creating.md/editing.md, SKILL.md is merged)
#   5. Commits and pushes if anything changed

name: Sync OfficeCLI Skills

on:
  repository_dispatch:
    types: [officecli-skills-updated]
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cli-jaw-skills
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone OfficeCLI (sparse — skills/ only)
        run: |
          git clone --filter=blob:none --sparse \
            https://github.com/lidge-jun/OfficeCLI.git \
            /tmp/officecli
          cd /tmp/officecli
          git sparse-checkout set skills/

      - name: Sync skills into format directories
        run: |
          SRC="/tmp/officecli/skills"

          # ── MAIN skills: creating.md + editing.md only (SKILL.md merged into parent) ──
          sync_main_files() {
            local skill="$1" parent="$2"
            local src_dir="$SRC/$skill"

            if [ ! -d "$src_dir" ]; then
              echo "⚠️  Skip $skill (not found)"
              return
            fi

            # Copy creating.md and editing.md to PARENT level (not into subfolder)
            for f in creating.md editing.md; do
              if [ -f "$src_dir/$f" ]; then
                cp "$src_dir/$f" "$parent/$f"
                echo "  ✅ $skill/$f → $parent/$f"
              fi
            done
          }

          # ── BONUS skills: full copy (SKILL.md + creating.md + everything) ──
          sync_bonus_skill() {
            local skill="$1" parent="$2"
            local src_dir="$SRC/$skill"
            local dst_dir="$parent/$skill"

            if [ ! -d "$src_dir" ]; then
              echo "⚠️  Skip $skill (not found)"
              return
            fi

            mkdir -p "$dst_dir"

            # Copy all .md files
            for f in "$src_dir"/*.md; do
              [ -f "$f" ] && cp "$f" "$dst_dir/"
            done

            # Copy subdirectories (reference/, scripts/, etc.)
            for d in "$src_dir"/*/; do
              [ -d "$d" ] && cp -r "$d" "$dst_dir/"
            done

            echo "  ✅ $skill → $parent/$skill/ (full)"
          }

          echo "=== MAIN skills (files only, SKILL.md excluded) ==="

          # HWP: no creating.md/editing.md exists — skip
          echo "  hwp: skip (no creating/editing files)"

          # DOCX
          sync_main_files "officecli-docx" "docx"

          # PPTX
          sync_main_files "officecli-pptx" "pptx"

          # XLSX
          sync_main_files "officecli-xlsx" "xlsx"

          echo ""
          echo "=== BONUS skills (full copy) ==="

          # DOCX bonus
          sync_bonus_skill "officecli-academic-paper" "docx"

          # PPTX bonus
          sync_bonus_skill "officecli-pitch-deck" "pptx"
          sync_bonus_skill "morph-ppt" "pptx"
          sync_bonus_skill "morph-ppt-3d" "pptx"

          # XLSX bonus
          sync_bonus_skill "officecli-financial-model" "xlsx"
          sync_bonus_skill "officecli-data-dashboard" "xlsx"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: sync officecli skills ($TIMESTAMP)

          Auto-synced from OfficeCLI repo.
          Triggered by: ${{ github.event_name }}"

            # Pull-rebase to handle concurrent runs, then push
            git pull --rebase origin main || true
            git push
            echo "✅ Pushed skill updates"
          fi
